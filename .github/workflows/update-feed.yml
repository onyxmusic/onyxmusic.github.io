name: Update Feed

on:
  schedule:
    - cron: '0 2 * * *'   # 05:00 TR
    - cron: '30 16 * * *' # 19:30 TR
    - cron: '0 13 * * *'
  workflow_dispatch:       # Elle de başlatılabilir

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ← Tüm history çek, diverge sorununu önler

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run npm install
        run: npm install

      - name: Run node scraper.js
        run: node scraper.js

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Otomatik Güncelleme: feed.json ve Orijinal Kapaklar yönlendi!"
          file_pattern: feed.json package.json
          push_options: '--force'   # ← Diverge sorununu bu çözüyor
